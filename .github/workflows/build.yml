name: Build Electron App

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build Next.js (Standalone)
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── NOUVEAU : créer la base de données seed pour le packaging ──────────
      - name: Créer la base de données seed
        shell: bash
        run: |
          npx prisma generate
          npx prisma db push
          npm run db:seed:prod
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── NOUVEAU : copier les assets dans le dossier standalone ────────────
      # Le server.js de Next.js standalone cherche ces dossiers dans son CWD.
      # Sans cette étape, l'app démarre mais ne sert aucun CSS/JS/image.
      - name: Préparer les assets du standalone
        shell: bash
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Build Electron App
        run: npx electron-builder --${{ matrix.os == 'ubuntu-latest' && 'linux' || (matrix.os == 'windows-latest' && 'win' || 'mac') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist-electron/*
          if-no-files-found: error