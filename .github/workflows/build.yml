name: Build Electron App

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false   # un OS qui échoue n'annule pas les autres
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # npm ci : install déterministe (respecte package-lock.json, plus rapide en CI)
      - name: Install dependencies
        run: npm ci

      # ── ÉTAPE 1 : client Prisma ─────────────────────────────────────────────
      # Doit précéder le build Next.js car Next.js importe @prisma/client
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── ÉTAPE 2 : build Next.js standalone ──────────────────────────────────
      # npm run build = "next build && node scripts/copy-standalone-assets.js"
      # → produit .next/standalone/ avec .next/static/ et public/ déjà intégrés
      # NE PAS ajouter de "cp -r" manuel après : ce serait une double copie
      - name: Build Next.js (Standalone + Assets)
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── ÉTAPE 3 : base de données seed ──────────────────────────────────────
      # DATABASE_URL "file:./prisma/dev.db" → Prisma résout le chemin relativement
      # à prisma/schema.prisma → DB créée dans prisma/prisma/dev.db
      # C'est exactement ce chemin que electron/main.js lit via :
      #   path.join(process.resourcesPath, 'prisma', 'prisma', 'dev.db')
      - name: Create and seed database
        shell: bash
        run: |
          npx prisma db push
          npm run db:seed:prod
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── ÉTAPE 4 : packaging Electron ────────────────────────────────────────
      # afterPack.js (déclaré dans electron-builder.json) recopie les node_modules
      # du standalone que electron-builder supprime sinon silencieusement
      - name: Build Electron App
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npx electron-builder --linux
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npx electron-builder --win
          else
            npx electron-builder --mac
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist-electron/*
          if-no-files-found: error