name: Build Electron App

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest   # production Windows uniquement

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── ÉTAPE 1 : client Prisma ─────────────────────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── ÉTAPE 2 : build Next.js standalone ──────────────────────────────────
      - name: Build Next.js (Standalone + Assets)
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── ÉTAPE 3 : base de données seed ──────────────────────────────────────
      - name: Create and seed database
        shell: bash
        run: |
          npx prisma db push
          npm run db:seed:prod
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      # ── ÉTAPE 4 : packaging Electron + publication GitHub Releases ───────────
      # --publish always → publie sur GitHub Releases à chaque build
      # --publish onTag  → publie uniquement sur git tag (ex: v1.2.3)
      - name: Build & Publish Electron
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Backup optionnel : conserve aussi l'artifact dans l'UI Actions (90j)
      - name: Upload Artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist-electron/*.exe
          if-no-files-found: error